# ansible-playbook bind-deploy.yaml -i <ton-inventaire>
#
# Deploie la configuration BIND9 sur le container VyOS.
#
# Les fichiers source sont dans etc/bind/ (versionnes dans git). Ce repo
# ne fournit pas d'inventaire -- vois le README pour cibler le groupe
# Ansible "vyos" depuis ton propre inventaire (usage standalone ou en
# submodule Git).
#
# rndc.key/tsig.key ne sont PAS geres par ce playbook (jamais commit,
# generes localement via tsig-keygen -- exclus explicitement du rsync).
#
# Ce playbook ne valide PAS la config localement, et c'est voulu : named.conf
# inclut ses fichiers annexes par chemin ABSOLU (include
# "/etc/bind/named.conf.options"), comme une fois deploye dans le container.
# Un named-checkconf nu sur la machine de controle resoudrait ces includes
# contre son propre /etc/bind (silencieusement faux, ou en erreur si absent).
# La validation (named-checkconf -z, boot reel de named + dig de controle)
# vit donc dans la CI, via Docker -- voir
# .github/workflows/validate-configs.yml, implementation de reference
# reutilisable dans n'importe quelle CI.
#
# Tags disponibles :
#   config   → copier les fichiers de zone sur VyOS
#   service  → recharger bind9
#   check    → verifier l'etat du container (post-deploiement, sur VyOS)
#
# Exemples :
#   ansible-playbook bind-deploy.yaml
#   ansible-playbook bind-deploy.yaml --tags config
#   ansible-playbook bind-deploy.yaml --tags check

- name: Deploy BIND9 config to VyOS container
  hosts: vyos
  gather_facts: false
  vars:
    bind_dest: /config/containers/bind9

  pre_tasks:
    # bind_conf n'est PAS mise dans vars: ci-dessus : les vars de play ont une
    # priorite plus haute que les group_vars/host_vars d'inventaire, ce qui
    # empecherait un inventaire de fournir sa propre valeur. Le default()
    # ci-dessous ne s'applique que si rien (inventaire ni -e) ne le fournit.
    - name: Resolve config source path (inventory override wins over bundled example)
      ansible.builtin.set_fact:
        bind_conf: "{{ bind_conf | default(playbook_dir + '/etc/bind') }}"
        bind_uid: "{{ bind_uid | default('5300') }}"
        bind_dynamic_zone_files: "{{ bind_dynamic_zone_files | default([]) }}"
        # Check optionnel de resolution reelle post-restart (tag check) :
        # definis bind_check_server (IP de bridge du container, joignable
        # uniquement DEPUIS l'hote VyOS) et bind_check_queries dans ton
        # inventaire pour activer de vrais dig en plus du show container.
        bind_check_server: "{{ bind_check_server | default('') }}"
        bind_check_queries: "{{ bind_check_queries | default([]) }}"
      delegate_to: localhost
      tags: always

    - name: Check source directory exists
      ansible.builtin.stat:
        path: "{{ bind_conf }}/named.conf"
      delegate_to: localhost
      register: _bind_conf_check
      tags: [config, service, check]

    - name: Fail if source directory missing
      ansible.builtin.fail:
        msg: "{{ bind_conf }}/named.conf not found."
      when: not _bind_conf_check.stat.exists
      tags: [config, service, check]

    # Previsualisation du diff avant application reelle. rsync --delete est
    # garde pour l'application (voir plus bas) car ansible.builtin.copy en
    # copie recursive ne supprime jamais les fichiers en trop cote distant --
    # mais un command shelle sort par defaut sous --check et ne montre aucun
    # contenu. On force donc l'execution (check_mode: false) d'un rsync PULL
    # en lecture seule vers un repertoire temporaire local, puis un diff -ruN
    # contre bind_conf, pour obtenir le meme niveau d'info que le --diff
    # natif de copy sur les 3 autres playbooks.
    - name: Create temporary local directory for remote config snapshot
      ansible.builtin.tempfile:
        state: directory
        prefix: bind_remote_snapshot_
      delegate_to: localhost
      check_mode: false
      register: _bind_remote_snapshot
      tags: [config]

    - name: Fetch current remote bind config for diff comparison
      ansible.builtin.command:
        cmd: >-
          rsync -az
          --exclude=tsig.key
          --exclude=rndc.key
          --exclude=*.jnl
          -e 'ssh -o StrictHostKeyChecking=no'
          --rsync-path='sudo rsync'
          {{ ansible_user }}@{{ ansible_host }}:{{ bind_dest }}/
          {{ _bind_remote_snapshot.path }}/
      delegate_to: localhost
      become: false
      check_mode: false
      changed_when: false
      failed_when: false
      tags: [config]

    - name: Show diff between local config and current remote state
      ansible.builtin.command:
        cmd: diff -ruN {{ _bind_remote_snapshot.path }} {{ bind_conf }}
      delegate_to: localhost
      check_mode: false
      register: _bind_diff
      changed_when: false
      failed_when: _bind_diff.rc > 1
      tags: [config]

    - name: Display config diff
      ansible.builtin.debug:
        msg: "{{ _bind_diff.stdout_lines | default(['(aucune difference)']) }}"
      tags: [config]

  tasks:
    # Pas de delegate_to/become explicite : ansible_become: true (host_vars)
    # s'applique par defaut, la tache tourne normalement sur l'hote cible.
    - name: Deploy and restart bind9
      block:
        - name: Synchronize bind config to VyOS
          ansible.builtin.command:
            cmd: >-
              rsync -az --delete --chmod=D0755,F0644
              --exclude=tsig.key
              --exclude=rndc.key
              -e 'ssh -o StrictHostKeyChecking=no'
              --rsync-path='sudo rsync'
              {{ bind_conf }}/
              {{ ansible_user }}@{{ ansible_host }}:{{ bind_dest }}/
          delegate_to: localhost
          become: false
          register: _rsync_result
          changed_when: "'Number of regular files transferred: 0' not in _rsync_result.stdout"
          notify: Restart bind9
          tags: [config]

        - name: Fix permissions for BIND dynamic updates (nsupdate/TSIG)
          ansible.builtin.shell: |
            chown {{ bind_uid }}:{{ bind_uid }} {{ bind_dest }}
            if [ -f {{ bind_dest }}/tsig.key ]; then
              chown {{ bind_uid }}:{{ bind_uid }} {{ bind_dest }}/tsig.key
              chmod 0400 {{ bind_dest }}/tsig.key
            fi
            {% for zone_file in bind_dynamic_zone_files %}
            chown {{ bind_uid }}:{{ bind_uid }} {{ bind_dest }}/{{ zone_file }}
            {% endfor %}
          changed_when: true
          tags: [config]

        # Gate avant restart : valide la config DEPLOYEE avec le binaire du
        # container bind9 lui-meme (les includes en chemins absolus
        # /etc/bind/... se resolvent dans le bon contexte, version de named
        # strictement identique a l'execution -- et zero docker/podman sur la
        # machine de controle). En cas d'echec, le play s'arrete AVANT le
        # flush du handler Restart bind9 : le named en cours continue de
        # servir l'ancienne config en memoire, le DNS reste up. Le fichier
        # sur disque est deja remplace (rsync ci-dessus) -- corriger et
        # redeployer, ou restaurer, avant tout restart manuel.
        - name: Validate deployed config with the container's own binary (named-checkconf -z)
          ansible.builtin.command:
            cmd: podman exec bind9 /usr/bin/named-checkconf -z /etc/bind/named.conf
          changed_when: false
          tags: [config]

        - name: Ensure bind cache directory exists with correct ownership
          ansible.builtin.file:
            path: "{{ bind_dest }}-cache"
            state: directory
            owner: "{{ bind_uid }}"
            group: "{{ bind_uid }}"
            mode: "0755"
          tags: [config]
      always:
        - name: Clean up local remote-state snapshot
          ansible.builtin.file:
            path: "{{ _bind_remote_snapshot.path }}"
            state: absent
          delegate_to: localhost
          check_mode: false
          tags: [config]

  handlers:
    - name: Restart bind9
      ansible.builtin.command:
        cmd: /opt/vyatta/bin/vyatta-op-cmd-wrapper restart container bind9
      tags: [service]

  post_tasks:
    # Pas de test dig contre l'IP de bridge podman du container bind9 : cette
    # IP n'est pas joignable en connexion directe ni depuis le netns par
    # defaut de VyOS ni depuis le reste du LAN (confirme empiriquement --
    # "No route to host" dans les deux cas ; Netavark ne fait que du DNAT
    # entrant sur les ports publies, et bind9 n'a justement aucun port publie
    # dans config.boot, contrairement a squid). Verification process-level
    # via show container, comme pour Suricata (meme contrainte).
    - name: Flush handlers to restart bind9 now
      ansible.builtin.meta: flush_handlers
      tags: [check]

    - name: Check bind9 container is running
      ansible.builtin.command:
        cmd: /opt/vyatta/bin/vyatta-op-cmd-wrapper show container
      register: _bind9_status
      changed_when: false
      failed_when: false
      tags: [check]

    - name: Display result
      ansible.builtin.debug:
        msg: "{{ _bind9_status.stdout_lines | select('search', 'bind9') | list }}"
      tags: [check]

    - name: Fail if bind9 isn't up
      ansible.builtin.fail:
        msg: "bind9 container not found running: {{ _bind9_status.stdout }}"
      when: "'bind9' not in _bind9_status.stdout or 'Up' not in (_bind9_status.stdout_lines | select('search', 'bind9') | first | default(''))"
      tags: [check]

    # Resolution reelle optionnelle, pilotee par inventaire. L'IP de bridge
    # n'est joignable que DEPUIS l'hote VyOS lui-meme (cf. gotcha ci-dessus),
    # donc ces requetes tournent sur l'hote cible, pas sur la machine de
    # controle. Inactif tant que bind_check_server n'est pas defini.
    - name: Wait for bind9 to answer on the bridge IP (from the VyOS host)
      ansible.builtin.wait_for:
        host: "{{ bind_check_server }}"
        port: 53
        timeout: 10
      when: bind_check_server | length > 0
      tags: [check]

    - name: Run real-resolution checks (from the VyOS host)
      ansible.builtin.command:
        cmd: dig @{{ bind_check_server }} {{ item.name }} {{ item.type }} +short +time=3 +tries=1
      loop: "{{ bind_check_queries }}"
      when: bind_check_server | length > 0
      register: _bind_check_results
      changed_when: false
      failed_when: _bind_check_results.rc != 0 or _bind_check_results.stdout == ""
      tags: [check]

    - name: Display real-resolution results
      ansible.builtin.debug:
        msg: "{{ item.item.name }} {{ item.item.type }} -> {{ item.stdout }}"
      loop: "{{ _bind_check_results.results | default([]) }}"
      tags: [check]
