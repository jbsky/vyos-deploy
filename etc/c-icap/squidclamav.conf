# squidclamav.conf — ClamAV module for c-icap (VyOS deployment)

maxsize 5M
timeout 3
# redirect disabled -- proxy.local never resolved in DNS, c-icap now falls
# back to its own built-in error template instead (documented behavior:
# "If this directive is disabled squidclamav will use c-icap error
# templates to report issues")
#redirect http://proxy.local/cgi-bin/clwarn.cgi
logredir 0
dnslookup 0
safebrowsing 0
scan_mode ScanAllExcept

# ClamAV daemon (TCP, same podman network)
clamd_ip 172.20.1.20
clamd_port 3310

# Trusted package repositories — skip AV scanning entirely
# These serve signed package indices and archives; ClamAV PUA signatures
# produce false positives on compressed package metadata (APKINDEX.tar.gz,
# Packages.gz, etc.). The packages themselves are GPG-signed upstream.
whitelist https?://dl-cdn\.alpinelinux\.org/
whitelist https?://([a-z0-9-]+\.)?alpinelinux\.org/
whitelist https?://([a-z0-9-]+\.)?debian\.org/
whitelist https?://([a-z0-9-]+\.)?ubuntu\.com/
whitelist https?://([a-z0-9-]+\.)?golang\.org/
whitelist https?://proxy\.golang\.org/
whitelist https?://([a-z0-9-]+\.)?npmjs\.org/
whitelist https?://registry\.npmjs\.org/
whitelist https?://([a-z0-9-]+\.)?pypi\.org/
whitelist https?://([a-z0-9-]+\.)?docker\.io/
whitelist https?://([a-z0-9-]+\.)?docker\.com/
whitelist https?://([a-z0-9-]+\.)?github\.com/
whitelist https?://([a-z0-9-]+\.)?githubusercontent\.com/

# Skip static assets
abort \.(ico|gif|png|jpg|jpeg|jp2|jpx|svg|swf|css|js|woff2?|ttf|otf|eot|mp[34]|m4[av])$
abortcontent ^image\/.*$
abortcontent ^text\/css.*$
abortcontent ^application\/(font|javascript|x-javascript).*$
