# =====================================================================
#  squid.conf -- Multi-mode VyOS production (transparent + explicit)
#
#  4 ports :
#    3128 : Proxy explicite classique (mode prod standard)
#    3129 : Transparent HTTP intercept (VLAN IoT, whitelist)
#    3130 : Proxy explicite + SSL Bump (mode prod standard)
#    3131 : Transparent HTTPS intercept peek+splice (VLAN IoT, whitelist)
#
#  Filtrage transparent :
#    - Whitelist par device (ACL source IP + domain)
#    - HTTP : filtrage dstdomain au niveau http_access
#    - HTTPS : filtrage ssl::server_name au niveau ssl_bump (peek SNI)
#    - Default deny (terminate/deny) = equivalent firewall DROP
#    - Logs vers Graylog (SNI + action dans access.log)
#
#  NOTE : les plages IP ci-dessous sont des EXEMPLES illustratifs.
#  Adapte-les a ton propre plan d'adressage (VLANs, reseau podman, etc.)
# =====================================================================

visible_hostname webproxy

# ==================== Ports d'ecoute ====================

# Mode 1 : Proxy explicite classique
http_port 3128 name=explicit tcpkeepalive=60,30,3

# Mode 2 : Transparent HTTP intercept (PBR + nsenter REDIRECT)
http_port 3129 intercept name=intercept_http

# Mode 3 : Proxy explicite + SSL Bump
http_port 3130 name=explicit_bump ssl-bump \
    cert=/etc/squid/ssl_cert/bump.pem \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=16MB \
    tls-dh=/etc/squid/ssl_cert/dhparam.pem \
    options=NO_SSLv3,NO_TLSv1,NO_TLSv1_1 \
    cipher=HIGH:MEDIUM:!aNULL:!eNULL:!RC4:!MD5:!DES:!3DES:!SHA1

# Mode 4 : Transparent HTTPS intercept (peek SNI + splice/terminate)
https_port 3131 intercept name=intercept_https ssl-bump \
    cert=/etc/squid/ssl_cert/bump.pem \
    generate-host-certificates=off \
    dynamic_cert_mem_cache_size=4MB \
    tls-dh=/etc/squid/ssl_cert/dhparam.pem \
    options=NO_SSLv3,NO_TLSv1,NO_TLSv1_1

# ==================== SSL Bump ====================

sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/ssl_db/db -M 20MB
sslcrtd_children 8 startup=2 idle=1
sslproxy_cert_error allow all

acl step1 at_step SslBump1
acl step2 at_step SslBump2
acl step3 at_step SslBump3

# --- Port differentiation ---
acl port_intercept_https myportname intercept_https
acl port_explicit_bump myportname explicit_bump

# --- Domaines exclus du bump (port 3130 seulement) ---
acl nobump_dst ssl::server_name_regex -i "/etc/squid/conf.d/nobump_domains.acl"

# --- IoT whitelist SNI (port 3131 seulement) ---
acl ha_sni ssl::server_name "/etc/squid/acl/ha-domains.txt"
acl iot_device2_sni ssl::server_name "/etc/squid/acl/iot-device2-domains.txt"
acl iot_common_sni ssl::server_name "/etc/squid/acl/iot-common-domains.txt"

# --- Device source ACLs (exemples -- remplace par tes propres IPs) ---
acl home_assistant src 192.168.10.50
acl iot_device2 src 192.168.10.51
acl blocked_devices src "/etc/squid/acl/blocked-devices.txt"
acl all_iot src 192.168.10.0/24

# Step 1 : peek ALL (recuperer SNI sur les 2 ports bump)
ssl_bump peek step1

# Step 2+ : Port 3131 (intercept) — whitelist, splice autorise, terminate refuse
ssl_bump terminate blocked_devices port_intercept_https
ssl_bump splice home_assistant port_intercept_https
ssl_bump splice home_assistant ha_sni port_intercept_https
ssl_bump splice home_assistant iot_common_sni port_intercept_https
ssl_bump splice iot_device2 port_intercept_https
ssl_bump splice iot_device2 iot_device2_sni port_intercept_https
ssl_bump splice iot_device2 iot_common_sni port_intercept_https
ssl_bump splice all_iot iot_common_sni port_intercept_https
ssl_bump terminate port_intercept_https

# Step 2+ : Port 3130 (explicit) — splice nobump, bump le reste
ssl_bump splice nobump_dst port_explicit_bump
ssl_bump bump port_explicit_bump

# Catch-all (ne devrait pas etre atteint)
ssl_bump terminate all

# ==================== DNS ====================

dns_nameservers 192.168.1.1
client_dst_passthru on
# 1.1.1.1 8.8.8.8 9.9.9.9

# ==================== ACLs reseau ====================

# Exemple : un reseau LAN principal + le reseau interne des containers
# proxy (podman/docker). Adapte a ton propre plan d'adressage.
acl localnet src 192.168.0.0/16
acl localnet src 172.20.1.0/24

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 21
acl Safe_ports port 443
acl Safe_ports port 70
acl Safe_ports port 210
acl Safe_ports port 1025-65535
acl Safe_ports port 280
acl Safe_ports port 488
acl Safe_ports port 591
acl Safe_ports port 777

acl CONNECT method CONNECT

# --- Port differentiation pour http_access ---
acl port_intercept_http myportname intercept_http
acl port_explicit myportname explicit

# --- IoT whitelist domains (pour HTTP intercept) ---
acl ha_domains dstdomain "/etc/squid/acl/ha-domains.txt"
acl iot_device2_domains dstdomain "/etc/squid/acl/iot-device2-domains.txt"
acl iot_common_domains dstdomain "/etc/squid/acl/iot-common-domains.txt"

# ==================== Regles d'acces ====================

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localhost manager
http_access deny manager

# --- Port 3129 (intercept HTTP) : whitelist par device ---
http_access deny blocked_devices port_intercept_http
http_access allow home_assistant ha_domains port_intercept_http
http_access allow home_assistant iot_common_domains port_intercept_http
http_access allow iot_device2 iot_device2_domains port_intercept_http
http_access allow iot_device2 iot_common_domains port_intercept_http
http_access allow iot_device2 port_intercept_http
http_access allow all_iot iot_common_domains port_intercept_http
http_access deny port_intercept_http

# --- Port 3131 (intercept HTTPS) : allow connection, filtering at ssl_bump ---
http_access deny blocked_devices port_intercept_https
http_access allow all_iot port_intercept_https
http_access deny port_intercept_https

# --- Ports 3128/3130 (explicite) : standard ---
http_access allow localnet port_explicit
http_access allow localnet port_explicit_bump
http_access allow localhost
http_access deny all

# ==================== ICAP / ClamAV ====================

icap_enable on
icap_send_client_ip on
icap_send_client_username on
icap_client_username_header X-Authenticated-User
icap_preview_enable on
icap_preview_size 1024
icap_service_failure_limit -1

icap_service service_req reqmod_precache bypass=1 icap://172.20.1.30:1344/squidclamav
adaptation_access service_req allow all

icap_service service_resp respmod_precache bypass=1 icap://172.20.1.30:1344/squidclamav
adaptation_access service_resp allow all

# ==================== Cache ====================

cache deny all

# ==================== Logs ====================

logformat squid_multi %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt %ssl::>sni %ssl::bump_mode %>lp

access_log stdio:/var/log/squid/access.log squid_multi
cache_log stdio:/var/log/squid/cache.log

# ==================== Securite ====================

httpd_suppress_version_string on
forwarded_for on
via on

request_header_max_size 64 KB
reply_header_max_size 64 KB
client_request_buffer_max_size 512 KB

# Inclusion drop-in
include /etc/squid/conf.d/*.conf
