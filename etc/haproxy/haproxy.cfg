# Automaticaly generated, dont edit manually.
global
	maxconn			500
	log			172.20.3.10	kern	debug
	stats socket /tmp/haproxy.socket level admin  expose-fd listeners
	nbthread			1
	hard-stop-after		15m
	tune.ssl.default-dh-param	2048
	log-send-hostname		haproxy

	# Ajoutez ces lignes pour les gros fichiers
	tune.bufsize            32768
	tune.maxrewrite         8192

defaults
        log     global
        mode    http
        option  httplog
        option  dontlognull
        retries 3

        # Timeouts pour les gros uploads
        timeout connect         10s
        timeout client          600s
        timeout server          600s
        timeout http-request    600s
        timeout http-keep-alive 10s
        timeout queue           30s

listen HAProxyLocalStats
	bind 127.0.0.1:2200 name localstats
	mode http
	stats enable
	stats admin if TRUE
	stats show-legends
	stats uri /haproxy/haproxy_stats.php?haproxystats=1
	timeout client 5000
	timeout connect 5000
	timeout server 5000

# Exemple -- remplace example.com et les backends par les tiens.
frontend WWW-merged
	bind			0.0.0.0:80 name 0.0.0.0:80
	bind			0.0.0.0:443 name 0.0.0.0:443   ssl crt-list /usr/local/etc/haproxy/WWW.crt_list
	mode			http
	log			global
	option			http-keep-alive
	option			forwardfor
	acl https ssl_fc
	http-request redirect scheme https code 301 if !https
	http-request set-header		X-Forwarded-Proto https if https
	http-request set-header		X-Real-IP %[src]
	timeout client		600000
        timeout client-fin      3600000
        acl                     app1.example.com	var(txn.txnhost) -m str -i app1.example.com
        acl                     aclcrt_APP1		var(txn.txnhost) -m reg -i ^app1\.example\.com(:([0-9]){1,5})?$
        acl                     mail.example.com       var(txn.txnhost) -m str -i mail.example.com
        acl                     aclcrt_MAIL             var(txn.txnhost) -m reg -i ^mail\.example\.com(:([0-9]){1,5})?$
	acl			www.example.com		var(txn.txnhost) -m str -i www.example.com
	acl			aclcrt_WWW		var(txn.txnhost) -m reg -i ^www\.example\.com(:([0-9]){1,5})?$
	acl			aclcrt_WWW		var(txn.txnhost) -m reg -i ^example\.com(:([0-9]){1,5})?$
	acl			example.com		var(txn.txnhost) -m str -i example.com
	acl			aclcrt_ROOT		var(txn.txnhost) -m reg -i ^www\.example\.com(:([0-9]){1,5})?$
	acl			aclcrt_ROOT		var(txn.txnhost) -m reg -i ^example\.com(:([0-9]){1,5})?$
	http-request set-var(txn.txnhost) hdr(host)
        use_backend traefik	if  app1.example.com		aclcrt_APP1
        use_backend traefik     if  mail.example.com		aclcrt_MAIL
        use_backend traefik     if  www.example.com		aclcrt_WWW
        use_backend traefik     if  example.com		aclcrt_ROOT
	default_backend be_redirect_to_main

backend K3S_ipvANY
	mode			http
	id			100
	log			global
	balance			roundrobin
	timeout connect		30000
	timeout server		600000
        timeout tunnel          3600000
	retries			3
	server			k3s-node1 192.168.1.101:30080 id 101
	server			k3s-node2 192.168.1.102:30080 id 102

backend traefik
        mode                    http
        id                      103
        timeout connect         30000
        timeout server          600000
        timeout tunnel          3600000
        retries                 3
        server traefik1 192.168.1.101:30443 ssl verify none
        log                     172.20.3.10   kern    debug

# Catch-all: redirect unknown subdomains to main site
backend be_redirect_to_main
        mode http
        http-request redirect location https://example.com/ code 301
