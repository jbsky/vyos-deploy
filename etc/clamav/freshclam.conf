# freshclam.conf – with HTTP proxy for VyOS deployment
DatabaseDirectory   /var/lib/clamav
UpdateLogFile       /var/log/clamav/freshclam.log
LogFileMaxSize      20M
LogTime             yes
LogVerbose          no
LogRotate           yes
PidFile             /run/clamav/freshclam.pid
DatabaseOwner       clamav
DatabaseMirror      database.clamav.net
Checks              24
Bytecode            yes
NotifyClamd         /etc/clamav/clamd.conf
HTTPProxyServer     172.20.1.10
HTTPProxyPort       3128
ConnectTimeout      30
ReceiveTimeout      60
TestDatabases       yes
ScriptedUpdates     yes
CompressLocalDatabase no
MaxAttempts         5
