# =====================================================================
#  clamd.conf – ClamAV daemon (durci pour usage ICAP/Squid)
# =====================================================================

LogFile             /var/log/clamav/clamd.log
LogFileMaxSize      50M
LogTime             yes
LogClean            no
LogVerbose          no
LogRotate           yes
PidFile             /run/clamav/clamd.pid
DatabaseDirectory   /var/lib/clamav

# Réseau – exposé uniquement sur le réseau interne docker
TCPSocket           3310
TCPAddr             0.0.0.0

# Pas de socket Unix vers l'extérieur ; uniquement local pour c-icap si même pod
LocalSocket         /run/clamav/clamd.sock
LocalSocketGroup    clamav
LocalSocketMode     660
FixStaleSocket      yes

# Identité
User                clamav
ExitOnOOM           yes
Foreground          yes

# Limites de scan (anti-DoS sur fichiers crafted)
MaxScanSize         400M
MaxFileSize         100M
MaxRecursion        16
MaxFiles            10000
MaxEmbeddedPE       40M
MaxHTMLNormalize    40M
MaxHTMLNoTags       8M
MaxScriptNormalize  20M
MaxZipTypeRcg       4M

# Threads
MaxThreads          20
MaxQueue            200
IdleTimeout         30
ReadTimeout         180
CommandReadTimeout  30
SendBufTimeout      200

# Détection heuristique / signatures
DetectPUA           yes
ExcludePUA          NetTool
ExcludePUA          PWTool
ExcludePUA          Win.Exploit
HeuristicScanPrecedence yes
AlertBrokenExecutables  yes
AlertEncrypted          no
AlertEncryptedArchive   no
AlertEncryptedDoc       no
AlertOLE2Macros         yes
ScanPE                  yes
ScanELF                 yes
ScanOLE2                yes
ScanPDF                 yes
ScanSWF                 yes
ScanHTML                yes
ScanArchive             yes
ScanMail                yes

# Bytecode (signatures dynamiques)
Bytecode                yes
BytecodeSecurity        TrustSigned
BytecodeTimeout         60000

# Tests
SelfCheck               600
